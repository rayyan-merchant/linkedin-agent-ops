name: Daily AI Brief

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:
    inputs:
      brief_date:
        description: "Optional brief date (YYYY-MM-DD)"
        required: false
        type: string
      force_send:
        description: "Send even if this date is already complete"
        required: false
        default: false
        type: boolean

concurrency:
  group: daily-ai-brief
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"
          cache: pip

      - name: Install application
        run: python -m pip install .

      - name: Generate and deliver brief
        env:
          BRIEF_DATE: ${{ inputs.brief_date }}
          FORCE_SEND: ${{ inputs.force_send }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM_NAME: ${{ vars.EMAIL_FROM_NAME || 'Daily AI Brief' }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        shell: bash
        run: |
          args=()
          if [[ -n "$BRIEF_DATE" ]]; then
            args+=(--date "$BRIEF_DATE")
          fi
          if [[ "$FORCE_SEND" == "true" ]]; then
            args+=(--force-send)
          fi
          python -m linkedin_agent_ops.daily_brief "${args[@]}"

