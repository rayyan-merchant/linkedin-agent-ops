[brief]
timezone = "Asia/Karachi"
paper_count = 3
trend_count = 3
repository_count = 3
minimum_successful_collectors = 2
minimum_candidates = 5

[lookback_hours]
arxiv = 48
hacker_news = 36
rss = 48
github_days = 7

[models]
gemini = "gemini-3.5-flash"
gemini_fallback = "gemini-2.5-pro"
groq = "openai/gpt-oss-120b"

[agents]
profile_path = "config/creator_profile.toml"
examples_path = "config/examples"
history_enabled = true
paper_max_bytes = 20971520
paper_max_pages = 100
paper_direct_context_chars = 120000
paper_chunk_chars = 30000

[ranking]
recency_weight = 30.0
relevance_weight = 35.0
source_quality_weight = 20.0
engagement_weight = 15.0

[topics]
keywords = [
  "computer vision",
  "world models",
  "NLP",
  "google",
  "openai",
  "claude",
  "software developemnt",
  "machine learning",
  "deep learning",
  "vision model",
  "object detection",
  "agentic ai",
  "ai agent",
  "multi-agent",
  "mlops",
  "rag",
  "retrieval augmented generation",
  "ai deployment",
  "inference",
  "research to production",
  "cricket computer vision",
]

[github]
queries = [
  "computer vision",
  "machine learning",
  "deep learning",
  "NLP",
  "skills",
  "ai agents",
  "mlops",
  "retrieval augmented generation",
  "ai inference",
]
minimum_stars = 3


